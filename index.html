<!DOCTYPE html>
<html ng-app="todoApp">
<head>
    <meta charset="utf-8">
    <title>Todo List</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

    <style>
        /* Custom styling to control size and aesthetics */
        body {
            background-color: #f4f7f6;
        }
        
        /* This controls the overall width of the app */
        .todo-wrapper {
            max-width: 750px; 
            margin: 60px auto;
        }
        
        .card {
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: none;
        }
        
        .card-header {
            background-color: #4361ee;
            color: white;
            border-top-left-radius: 12px !important;
            border-top-right-radius: 12px !important;
            padding: 1.25rem;
        }
        
        /* Strikethrough effect for completed tasks */
        .completed-text {
            text-decoration: line-through;
            color: #adb5bd;
            font-style: italic;
        }
        
        .table th {
            border-top: none;
            color: #495057;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
    </style>
</head>

<body ng-controller="TodoController">

    <div class="container todo-wrapper">
        <div class="card">
            <div class="card-header text-center">
                <h3 class="mb-0 fw-bold">Daily Task Tracker</h3>
            </div>

            <div class="card-body p-4">
                
                <form ng-submit="addTask()" class="d-flex gap-3 mb-4">
                    <input type="text" class="form-control" placeholder="What needs to be done?" ng-model="newTask.name" required>
                    <input type="date" class="form-control w-auto" ng-model="newTask.date" required>
                    <button type="submit" class="btn btn-primary px-4 fw-bold shadow-sm">Add</button>
                </form>

                <hr class="mb-4 text-muted">

                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th width="5%">#</th>
                                <th width="45%">Task</th>
                                <th width="20%">Date</th>
                                <th width="15%" class="text-center">Done</th>
                                <th width="15%" class="text-end">Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr ng-repeat="task in tasks">
                                <td class="text-muted">{{$index + 1}}</td>
                                
                                <td ng-class="{'completed-text': task.completed}" class="fw-medium">
                                    {{task.name}}
                                </td>
                                
                                <td ng-class="{'completed-text': task.completed}">
                                    {{task.date | date:'mediumDate'}}
                                </td>
                                
                                <td class="text-center">
                                    <input class="form-check-input fs-5" type="checkbox" ng-model="task.completed">
                                </td>
                                
                                <td class="text-end">
                                    <button class="btn btn-outline-danger btn-sm rounded-pill px-3" ng-click="removeTask($index)">
                                        Delete
                                    </button>
                                </td>
                            </tr>

                            <tr ng-if="tasks.length === 0">
                                <td colspan="5" class="text-center text-muted py-5">
                                    <p class="mb-0 fs-5">No tasks yet.</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>

<script>
angular.module('todoApp', [])
.controller('TodoController', function($scope) {

    $scope.tasks = [];

    $scope.newTask = {
        name: '',
        date: '',
        completed: false
    };

    $scope.addTask = function() {
        $scope.tasks.push({
            name: $scope.newTask.name,
            date: $scope.newTask.date,
            completed: false
        });

        // Clear the form after adding
        $scope.newTask = {
            name: '',
            date: '',
            completed: false
        };
    };

    $scope.removeTask = function(index) {
        $scope.tasks.splice(index, 1);
    };

});
</script>

</body>
</html>
