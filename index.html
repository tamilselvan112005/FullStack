<!DOCTYPE html>
<html>
<head>
    <title>BMI Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f4f6f8;
        }
        .container {
            width: 360px;
            background: white;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h2 {
            text-align: center;
            color: #222;
            margin-bottom: 25px;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #dcdcdc;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
        }
        input:focus {
            border-color: #444;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #222;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: #444;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>BMI Calculator</h2>
    <form action="/calculate" method="POST">
        <input type="number" step="0.1" name="weight" placeholder="Enter Weight (kg)" required>
        <input type="number" step="0.01" name="height" placeholder="Enter Height (m)" required>
        <button type="submit">Calculate</button>
    </form>
</div>
</body>
</html>
