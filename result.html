<!DOCTYPE html>
<html>
<head>
    <title>BMI Result</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f4f6f8;
        }
        .card {
            width: 360px;
            background: white;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
        }
        h2 {
            color: #222;
            margin-bottom: 20px;
        }
        .bmi {
            font-size: 38px;
            font-weight: bold;
            color: #111;
            margin-bottom: 20px;
        }
        a {
            display: inline-block;
            padding: 10px 18px;
            background: #222;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }
        a:hover {
            background: #444;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>Your BMI Result</h2>
    <div class="bmi">{{BMI}}</div>
    <a href="/">Calculate Again</a>
</div>
</body>
</html>
